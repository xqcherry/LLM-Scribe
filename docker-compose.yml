version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: summary_chroma
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/data
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_HOST=0.0.0.0
    restart: always

  redis:
    image: redis:7.0-alpine
    container_name: summary_redis
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes --protected-mode no
    restart: always